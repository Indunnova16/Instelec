{% extends "construccion/planillas/_base.html" %}
{% block contenido %}
<section>
  <h2>Cartilla de acero</h2>
  <table class="kv">
    <tr><td class="lbl">Peso teórico estructura (kg)</td><td>{{ torre.peso_kg|default:"—" }}</td></tr>
    <tr><td class="lbl">Tipo estructura</td><td>{{ torre.tipo|default:"—" }}</td></tr>
  </table>
</section>
<section>
  <h2>Observaciones de campo</h2>
  <p style="border:1px solid #aaa; min-height:20mm; padding:4mm;">
    {{ patas.0.observaciones|default:"" }}
  </p>
</section>
{% endblock %}
