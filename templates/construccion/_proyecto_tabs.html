<!-- Navegación de pestañas persistente para proyecto construcción -->
<div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
    <a href="{% url 'construccion:contrato' proyecto.id %}"
       class="px-6 py-3 text-sm font-medium border-b-2 transition
              {% if active_tab == 'contrato' %}
                border-blue-600 text-blue-600 dark:text-blue-400
              {% else %}
                border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200
              {% endif %}">
        Contrato
    </a>
    <a href="{% url 'construccion:ingenieria' proyecto.id %}"
       class="px-6 py-3 text-sm font-medium border-b-2 transition
              {% if active_tab == 'ingenieria' %}
                border-blue-600 text-blue-600 dark:text-blue-400
              {% else %}
                border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200
              {% endif %}">
        Ingeniería
    </a>
    <a href="{% url 'construccion:preliminares' proyecto.id %}"
       class="px-6 py-3 text-sm font-medium border-b-2 transition
              {% if active_tab == 'preliminares' %}
                border-blue-600 text-blue-600 dark:text-blue-400
              {% else %}
                border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200
              {% endif %}">
        Preliminares
    </a>
</div>
