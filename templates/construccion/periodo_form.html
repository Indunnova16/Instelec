{% extends 'base.html' %}
{% block title %}Nuevo período financiero{% endblock %}
{% block content %}
<div class="max-w-md mx-auto space-y-6">
  <h1 class="text-2xl font-bold">Nuevo período financiero</h1>
  <p class="text-sm text-gray-500">{{ proyecto.nombre }}</p>
  <form method="post" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
        <div>{{ field }}</div>
        {% if field.errors %}<p class="text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
      </div>
    {% endfor %}
    <div class="flex justify-end gap-3 pt-4 border-t">
      <a href="{% url 'construccion:financiero_grid' proyecto.id %}" class="px-4 py-2 border rounded-lg">Cancelar</a>
      <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Crear período</button>
    </div>
  </form>
</div>
<style>input,select{width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:.5rem;}</style>
{% endblock %}
