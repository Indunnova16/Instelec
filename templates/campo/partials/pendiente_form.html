<form hx-post="{% url 'campo:pendiente_crear' vano.id %}"
    hx-target="#pendientes-{{ vano.id }}"
    hx-swap="innerHTML"
    @submit="showFormPendiente = false"
    class="space-y-3 p-4 bg-blue-50 rounded-lg border border-blue-200">
    {% csrf_token %}

    <div>
        <label for="descripcion-{{ vano.id }}" class="block text-sm font-medium text-gray-700 mb-1">
            Descripción
        </label>
        <textarea name="descripcion"
            id="descripcion-{{ vano.id }}"
            required
            rows="2"
            placeholder="Describe la tarea pendiente..."
            class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-2">
        <div>
            <label for="fecha-{{ vano.id }}" class="block text-sm font-medium text-gray-700 mb-1">
                Fecha de vencimiento
            </label>
            <input type="date"
                name="fecha_vencimiento"
                id="fecha-{{ vano.id }}"
                required
                class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
        </div>

        <div>
            <label for="obs-{{ vano.id }}" class="block text-sm font-medium text-gray-700 mb-1">
                Observaciones (opcional)
            </label>
            <input type="text"
                name="observaciones"
                id="obs-{{ vano.id }}"
                placeholder="Notas adicionales..."
                class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
        </div>
    </div>

    <div class="flex gap-2 justify-end">
        <button type="button"
            @click="showFormPendiente = false"
            class="px-3 py-1 text-sm rounded border border-gray-300 text-gray-700 hover:bg-gray-50">
            Cancelar
        </button>
        <button type="submit"
            class="px-3 py-1 text-sm rounded bg-blue-600 text-white hover:bg-blue-700">
            Agregar
        </button>
    </div>
</form>
