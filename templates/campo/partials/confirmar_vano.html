<!-- Modal de confirmación para marcar vano como ejecutado -->
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" id="modal-confirmacion-vano">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="p-6">
            <!-- Header -->
            <div class="flex items-center gap-3 mb-4">
                <div class="flex-shrink-0 w-12 h-12 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
                    <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Confirmar Ejecución</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Vano #{{ vano.numero_vano }}</p>
                </div>
            </div>

            <!-- Contenido -->
            <div class="mb-6">
                <p class="text-gray-700 dark:text-gray-300 mb-4">
                    ¿Estás seguro de marcar este vano como <strong class="text-green-600">EJECUTADO</strong>?
                </p>
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-3 text-sm">
                    <p class="text-gray-600 dark:text-gray-400">
                        <strong>Vano:</strong> Torre {{ vano.torre_inicio.numero }} → Torre {{ vano.torre_fin.numero }}
                    </p>
                </div>
            </div>

            <!-- Observaciones opcionales -->
            <div class="mb-6">
                <label for="observaciones-vano" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Observaciones (opcional)
                </label>
                <textarea id="observaciones-vano" name="observaciones" rows="3"
                          class="w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
                          placeholder="Agrega cualquier observación sobre este vano..."></textarea>
            </div>

            <!-- Botones -->
            <div class="flex gap-3">
                <button type="button"
                        onclick="document.getElementById('modal-confirmacion-vano').remove()"
                        class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    Cancelar
                </button>
                <button type="button"
                        hx-post="{% url 'campo:marcar_vano' vano.id %}"
                        hx-vals='{"estado": "ejecutado", "confirmar": "true"}'
                        hx-include="#observaciones-vano"
                        hx-target="#vano-{{ vano.id }}"
                        hx-swap="outerHTML"
                        class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                    Sí, Confirmar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto-cerrar modal al hacer clic fuera
    document.getElementById('modal-confirmacion-vano').addEventListener('click', function(e) {
        if (e.target === this) {
            this.remove();
        }
    });
</script>
